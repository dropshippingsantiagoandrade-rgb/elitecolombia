<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://script.googleusercontent.com">
    <style>
        body, html { margin:0; padding:0; height:100%; width:100%; }
        iframe { width:100%; height:100%; border:none; }
    </style>
</head>
<body>
    <script>
        var scriptUrl = "https://script.google.com/macros/s/AKfycbw8OZtDjl2kzs0zUU_RoVL6CzOiUnQl9cG9wzS_Bapux06Sb6SjxngKw0aX3_6IpCQ/exec";
        var params = window.location.search; // ya trae el "?" si existe
        if (params) scriptUrl += params;
        var iframe = document.createElement('iframe');
        iframe.src = scriptUrl;
        iframe.setAttribute('allow', 'clipboard-read; clipboard-write');
        document.body.appendChild(iframe);
    </script>
</body>
</html>
