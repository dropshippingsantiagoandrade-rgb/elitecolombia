<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Colombia - Plataforma</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="app-frame" src=""></iframe>

    <script>
        // Aquí está el link de tu nuevo script de Google (el que vi en tu captura)
        var scriptUrl = "https://script.google.com/macros/s/AKfycbxgKTz2r8k5SdLf9-wgHM0zUNjXNqcV-627d5nbsf5ayy-um67kcGEEGLEi_V8SmfY/exec";
        
        // Esto captura si el link trae ?vendedor=... o ?boleto=...
        var parametros = window.location.search;
        
        // Carga el iframe uniendo el script de Google + los parámetros
        document.getElementById("app-frame").src = scriptUrl + parametros;
    </script>
</body>
</html>
