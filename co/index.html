<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Colombia</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #050a06; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <script>
        var scriptUrl = "https://script.google.com/macros/s/AKfycbzKwHSjSCGgl662DE_lLYiW0bEfJPqyltg4-Adhf3Um7dBt_9oUA79ar4Y3lkI2KBM/exec";

        var path = window.location.pathname;
        var params = new URLSearchParams(window.location.search);
        var finalUrl = scriptUrl;

        // Rutas tipo /boleta/0045
        if (path.includes("/boleta/")) {
            var parts = path.split("/boleta/");
            if (parts.length > 1) {
                var numero = parts[1].replace(/[^0-9]/g, '');
                if (numero) finalUrl += "?boleto=" + numero;
            }
        }
        // Rutas tipo /catalogo
        else if (path.includes("/catalogo")) {
            finalUrl += "?v=cliente";
            var vend = params.get('vendedor');
            if (vend) finalUrl += "&vendedor=" + encodeURIComponent(vend);
        }
        // ?boleto=0045
        else if (params.get('boleto')) {
            finalUrl += "?boleto=" + params.get('boleto');
        }
        // ?vendedor=nombre
        else if (params.get('vendedor')) {
            finalUrl += "?vendedor=" + encodeURIComponent(params.get('vendedor'));
        }

        var iframe = document.createElement('iframe');
        iframe.src = finalUrl;
        document.body.appendChild(iframe);
    </script>
</body>
</html>
