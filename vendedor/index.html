<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin:0; padding:0; height:100%; width:100%; background:#050a06; }
        #miIframe { width:100%; height:100%; border:none; }
    </style>
</head>
<body>
    <iframe id="miIframe" allow="clipboard-read; clipboard-write; storage-access-api" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    <script>
        var scriptUrl = "TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUI/exec";
        var iframe = document.getElementById('miIframe');
        
        // Pasamos la URL completa con parámetros
        iframe.src = scriptUrl + window.location.search;

        // Intentar solicitar permiso de almacenamiento (crucial para iOS)
        if (document.requestStorageAccess) {
            document.requestStorageAccess().catch(function() {});
        }
    </script>
</body>
</html>
