<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifas Elite Colombia</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #fafafa; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <script>
        // Forzamos el parámetro ?login=1 desde la base
        var scriptUrl = "https://script.google.com/macros/s/AKfycbw8OZtDjl2kzs0zUU_RoVL6CzOiUnQl9cG9wzS_Bapux06Sb6SjxngKw0aX3_6IpCQ/exec?login=1";
        
        // Si hay más parámetros en la URL (ej. ?dd=Elite-SA), los añadimos con "&"
        var params = window.location.search;
        if (params) {
            scriptUrl += "&" + params.substring(1); 
        }

        var iframe = document.createElement('iframe');
        iframe.src = scriptUrl;
        iframe.setAttribute('allow', 'clipboard-read; clipboard-write');
        document.body.appendChild(iframe);
    </script>
</body>
</html>
